spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tableorder}
    username: ${SPRING_DATASOURCE_USERNAME:tableorder}
    password: ${SPRING_DATASOURCE_PASSWORD:tableorder}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiry-hours: ${JWT_EXPIRY_HOURS:16}

upload:
  dir: ${UPLOAD_DIR:./uploads}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

management:
  endpoints:
    web:
      exposure:
        include: health,info
