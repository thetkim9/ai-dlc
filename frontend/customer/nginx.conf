server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE 설정
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /uploads/ {
        proxy_pass http://backend:8080;
    }
}
